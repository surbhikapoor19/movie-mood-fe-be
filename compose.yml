services:
  backend:
    build:
      context: backend
      dockerfile: docker/Dockerfile
      args:
        PORT: ${BACKEND_PORT}
    image: movie-backend
    environment:
      LOCAL_MODEL: ${LOCAL_MODEL}
    secrets:
      - hf_token
    ports:
      - 22060:${BACKEND_PORT}
    networks:
      - movie_net
    restart: unless-stopped

  frontend:
    build:
      context: frontend
      dockerfile: docker/Dockerfile
      args:
        - PORT=${FRONTEND_PORT}
    image: movie-frontend
    environment:
      BACKEND_URL: "http://backend:${BACKEND_PORT}"
    depends_on:
      - backend
    ports:
      - 22061:${FRONTEND_PORT}
    networks:
      - movie_net
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    depends_on:
    - frontend
    command:
    - "http"
    - "http://frontend:${FRONTEND_PORT}"
    networks:
    - movie_net
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    restart: unless-stopped

networks:
  movie_net:
    driver: bridge

secrets:
  hf_token:
    environment: HF_TOKEN
  ngrok_token:
    environment: NGROK_AUTHTOKEN